name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  CARGO_TERM_COLOR: always

jobs:
  # ─── Test + Lint ────────────────────────────────────────────────────────────
  test:
    name: Test & Lint
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy, rustfmt

      - name: Cache cargo registry
        uses: Swatinem/rust-cache@v2

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install frontend dependencies
        working-directory: frontend
        run: npm ci

      - name: Check formatting
        run: cargo fmt --all -- --check

      - name: Clippy
        run: cargo clippy --workspace --all-targets -- -D warnings

      - name: Frontend typecheck
        working-directory: frontend
        run: npm run check

      - name: Frontend production build
        working-directory: frontend
        run: npm run build

      - name: Run non-server workspace tests
        run: cargo test --workspace --all-targets --exclude dal-server

      - name: Run dal-server integration stack
        run: bash ./scripts/test.sh --with-cognito

  # ─── Build & Push Docker images (main branch only) ──────────────────────────
  docker:
    name: Build & Push Docker
    needs: test
    runs-on: ubuntu-latest
    environment: aws-deploy
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    outputs:
      server_image: ${{ steps.server-image.outputs.image }}
      worker_image: ${{ steps.worker-image.outputs.image }}
    permissions:
      id-token: write # for OIDC
      contents: read

    steps:
      - uses: actions/checkout@v4

      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_DEPLOY_ROLE_ARN }}
          aws-region: ${{ vars.AWS_REGION }}

      - name: Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Set image tag
        id: vars
        run: echo "tag=${GITHUB_SHA::8}" >> "$GITHUB_OUTPUT"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push dal-server
        id: build-server
        uses: docker/build-push-action@v6
        with:
          context: .
          target: server
          push: true
          tags: |
            ${{ secrets.ECR_REGISTRY }}/fidan/dal-server:${{ steps.vars.outputs.tag }}
            ${{ secrets.ECR_REGISTRY }}/fidan/dal-server:latest
          cache-from: type=gha,scope=dal-server
          cache-to: type=gha,mode=max,scope=dal-server

      - name: Capture dal-server image reference
        id: server-image
        run: echo "image=${{ secrets.ECR_REGISTRY }}/fidan/dal-server@${{ steps.build-server.outputs.digest }}" >> "$GITHUB_OUTPUT"

      - name: Build and push dal-worker
        id: build-worker
        uses: docker/build-push-action@v6
        with:
          context: .
          target: worker
          push: true
          tags: |
            ${{ secrets.ECR_REGISTRY }}/fidan/dal-worker:${{ steps.vars.outputs.tag }}
            ${{ secrets.ECR_REGISTRY }}/fidan/dal-worker:latest
          cache-from: type=gha,scope=dal-worker
          cache-to: type=gha,mode=max,scope=dal-worker

      - name: Capture dal-worker image reference
        id: worker-image
        run: echo "image=${{ secrets.ECR_REGISTRY }}/fidan/dal-worker@${{ steps.build-worker.outputs.digest }}" >> "$GITHUB_OUTPUT"

  # ─── Deploy to ECS (main branch only, after Docker push) ────────────────────
  deploy:
    name: Deploy to ECS
    needs: docker
    runs-on: ubuntu-latest
    environment: aws-deploy
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    permissions:
      id-token: write
      contents: read

    steps:
      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_DEPLOY_ROLE_ARN }}
          aws-region: ${{ vars.AWS_REGION }}

      - name: Prepare ECS task definitions
        run: |
          set -euo pipefail

          SERVER_TASK_DEF_ARN="$(aws ecs describe-services \
            --cluster "${{ secrets.ECS_CLUSTER }}" \
            --services "${{ secrets.ECS_SERVER_SERVICE }}" \
            --query 'services[0].taskDefinition' \
            --output text)"

          WORKER_TASK_DEF_ARN="$(aws ecs describe-services \
            --cluster "${{ secrets.ECS_CLUSTER }}" \
            --services "${{ secrets.ECS_WORKER_SERVICE }}" \
            --query 'services[0].taskDefinition' \
            --output text)"

          aws ecs describe-task-definition \
            --task-definition "$SERVER_TASK_DEF_ARN" \
            --query 'taskDefinition' \
            > server-task-definition.raw.json

          aws ecs describe-task-definition \
            --task-definition "$WORKER_TASK_DEF_ARN" \
            --query 'taskDefinition' \
            > worker-task-definition.raw.json

          jq 'del(
            .taskDefinitionArn,
            .revision,
            .status,
            .requiresAttributes,
            .compatibilities,
            .registeredAt,
            .registeredBy
          )' server-task-definition.raw.json > server-task-definition.base.json

          jq 'del(
            .taskDefinitionArn,
            .revision,
            .status,
            .requiresAttributes,
            .compatibilities,
            .registeredAt,
            .registeredBy
          )' worker-task-definition.raw.json > worker-task-definition.base.json

          jq \
            --arg repo "${{ secrets.ECR_REGISTRY }}/fidan/dal-server" \
            --arg image "${{ needs.docker.outputs.server_image }}" \
            '.containerDefinitions |= map(
              if (.image | startswith($repo))
              then .image = $image
              else .
              end
            )' server-task-definition.base.json > server-task-definition.json

          jq \
            --arg repo "${{ secrets.ECR_REGISTRY }}/fidan/dal-worker" \
            --arg image "${{ needs.docker.outputs.worker_image }}" \
            '.containerDefinitions |= map(
              if (.image | startswith($repo))
              then .image = $image
              else .
              end
            )' worker-task-definition.base.json > worker-task-definition.json

          jq -e --arg image "${{ needs.docker.outputs.server_image }}" \
            'any(.containerDefinitions[]; .image == $image)' \
            server-task-definition.json >/dev/null

          jq -e --arg image "${{ needs.docker.outputs.worker_image }}" \
            'any(.containerDefinitions[]; .image == $image)' \
            worker-task-definition.json >/dev/null

      - name: Register and deploy dal-server task definition
        run: |
          set -euo pipefail

          SERVER_TASK_DEF_ARN="$(aws ecs register-task-definition \
            --cli-input-json file://server-task-definition.json \
            --query 'taskDefinition.taskDefinitionArn' \
            --output text)"

          aws ecs update-service \
            --cluster "${{ secrets.ECS_CLUSTER }}" \
            --service "${{ secrets.ECS_SERVER_SERVICE }}" \
            --task-definition "$SERVER_TASK_DEF_ARN" \
            --force-new-deployment \
            --region "${{ vars.AWS_REGION }}"

      - name: Register and deploy dal-worker task definition
        run: |
          set -euo pipefail

          WORKER_TASK_DEF_ARN="$(aws ecs register-task-definition \
            --cli-input-json file://worker-task-definition.json \
            --query 'taskDefinition.taskDefinitionArn' \
            --output text)"

          aws ecs update-service \
            --cluster "${{ secrets.ECS_CLUSTER }}" \
            --service "${{ secrets.ECS_WORKER_SERVICE }}" \
            --task-definition "$WORKER_TASK_DEF_ARN" \
            --force-new-deployment \
            --region "${{ vars.AWS_REGION }}"

      - name: Wait for dal-server stability
        run: |
          aws ecs wait services-stable \
            --cluster "${{ secrets.ECS_CLUSTER }}" \
            --services "${{ secrets.ECS_SERVER_SERVICE }}" \
            --region "${{ vars.AWS_REGION }}"

      - name: Wait for dal-worker stability
        run: |
          aws ecs wait services-stable \
            --cluster "${{ secrets.ECS_CLUSTER }}" \
            --services "${{ secrets.ECS_WORKER_SERVICE }}" \
            --region "${{ vars.AWS_REGION }}"
