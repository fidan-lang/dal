name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  CARGO_TERM_COLOR: always
  AWS_REGION: ${{ vars.AWS_REGION || 'eu-central-1' }}
  ECR_REGISTRY: ${{ secrets.ECR_REGISTRY }}

jobs:
  # ─── Test + Lint ────────────────────────────────────────────────────────────
  test:
    name: Test & Lint
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy, rustfmt

      - name: Cache cargo registry
        uses: Swatinem/rust-cache@v2

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install frontend dependencies
        working-directory: frontend
        run: npm ci

      - name: Check formatting
        run: cargo fmt --all -- --check

      - name: Clippy
        run: cargo clippy --workspace --all-targets -- -D warnings

      - name: Frontend typecheck
        working-directory: frontend
        run: npm run check

      - name: Frontend production build
        working-directory: frontend
        run: npm run build

      - name: Run non-server workspace tests
        run: cargo test --workspace --all-targets --exclude dal-server

      - name: Run dal-server integration stack
        run: bash ./scripts/test.sh --with-cognito

  # ─── Build & Push Docker images (main branch only) ──────────────────────────
  docker:
    name: Build & Push Docker
    needs: test
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    permissions:
      id-token: write # for OIDC
      contents: read

    steps:
      - uses: actions/checkout@v4

      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_DEPLOY_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Set image tag
        id: vars
        run: echo "tag=${GITHUB_SHA::8}" >> "$GITHUB_OUTPUT"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push dal-server
        uses: docker/build-push-action@v6
        with:
          context: .
          target: server
          push: true
          tags: |
            ${{ env.ECR_REGISTRY }}/dal-server:${{ steps.vars.outputs.tag }}
            ${{ env.ECR_REGISTRY }}/dal-server:latest
          cache-from: type=gha,scope=dal-server
          cache-to: type=gha,mode=max,scope=dal-server

      - name: Build and push dal-worker
        uses: docker/build-push-action@v6
        with:
          context: .
          target: worker
          push: true
          tags: |
            ${{ env.ECR_REGISTRY }}/dal-worker:${{ steps.vars.outputs.tag }}
            ${{ env.ECR_REGISTRY }}/dal-worker:latest
          cache-from: type=gha,scope=dal-worker
          cache-to: type=gha,mode=max,scope=dal-worker

  # ─── Deploy to ECS (main branch only, after Docker push) ────────────────────
  deploy:
    name: Deploy to ECS
    needs: docker
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    permissions:
      id-token: write
      contents: read

    steps:
      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_DEPLOY_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Set image tag
        id: vars
        run: echo "tag=${GITHUB_SHA::8}" >> "$GITHUB_OUTPUT"

      - name: Deploy dal-server to ECS
        run: |
          aws ecs update-service \
            --cluster "${{ secrets.ECS_CLUSTER }}" \
            --service "${{ secrets.ECS_SERVER_SERVICE }}" \
            --force-new-deployment \
            --region "${{ env.AWS_REGION }}"

      - name: Deploy dal-worker to ECS
        run: |
          aws ecs update-service \
            --cluster "${{ secrets.ECS_CLUSTER }}" \
            --service "${{ secrets.ECS_WORKER_SERVICE }}" \
            --force-new-deployment \
            --region "${{ env.AWS_REGION }}"

      - name: Wait for dal-server stability
        run: |
          aws ecs wait services-stable \
            --cluster "${{ secrets.ECS_CLUSTER }}" \
            --services "${{ secrets.ECS_SERVER_SERVICE }}" \
            --region "${{ env.AWS_REGION }}"

      - name: Wait for dal-worker stability
        run: |
          aws ecs wait services-stable \
            --cluster "${{ secrets.ECS_CLUSTER }}" \
            --services "${{ secrets.ECS_WORKER_SERVICE }}" \
            --region "${{ env.AWS_REGION }}"
